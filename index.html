<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atreus Drawing App</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
    
  <div class="app">
    <div class="toolbar">
      <h3>SDSLabs</h3>
      <label for="stroke">Colour:</label>
      <input id="stroke" name="stroke" type="color">
      <label for="size">Size:</label>
      <input type="range" min="1" max="50" value="5" step="1" id="volumeSlider">
      <label>Value: <span id="sliderValue">5</span></label>
      <button onclick="toggleButton(this, 'brush')">Brush</button>
      <button onclick="toggleButton(this, 'erase')">Erase</button>
      <button onclick="toggleButton(this, 'rectangle')">Rectangle</button>
      <button onclick="toggleButton(this, 'circle')">Circle</button>
      <button onclick="toggleButton(this, 'triangle')">Triangle</button>
      <button id="dark" onclick="toggleDarkMode()">Dark Mode</button>
      <button id="image" onclick="addRandomImage()">Add Random Image</button>
      <button onclick="clearCanvas()">Clear</button>
      <button id="Undo" onclick="undo()">Undo</button>

    </div>
    <canvas id="canvas"></canvas>
  </div>
  <script src="script.js"></script>
</body>
</html>
